# Casos de prueba para el Proyecto B (extractor de datos).
#
# Cada caso trae el texto de entrada y el JSON esperado (gold standard,
# etiquetado a mano). "producto" se etiquetó tal cual aparece en el texto
# (sin normalizar a singular) para que el matching sea confiable — ver la
# nota sobre esto en evaluate.py / docs.
#
# 5 de los 20 casos NO dan el precio unitario directamente: dan el total de
# varias unidades y el modelo tiene que calcular total / cantidad. Sirven
# para medir si el few-shot (que muestra un ejemplo resuelto así) ayuda de
# verdad en ese caso más difícil.

