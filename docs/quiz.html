<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz — Lección 1: Cliente de API para LLMs</title>
<style>
  :root {
    --bg: #f6f4ef;
    --card: #ffffff;
    --ink: #2b2a27;
    --muted: #6b675e;
    --accent: #b0562e;
    --ok-bg: #e6f2e6; --ok-border: #3d8b40; --ok-ink: #245c27;
    --bad-bg: #fbe9e7; --bad-border: #c0442a; --bad-ink: #8a2f1c;
    --line: #e4e0d6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Georgia, "Times New Roman", serif;
    background: var(--bg); color: var(--ink);
    line-height: 1.55; padding: 2.5rem 1rem 5rem;
  }
  .wrap { max-width: 760px; margin: 0 auto; }
  header { margin-bottom: 2.2rem; }
  header h1 { font-size: 1.9rem; font-weight: normal; }
  header h1 em { color: var(--accent); font-style: italic; }
  header p { color: var(--muted); margin-top: .4rem; font-size: .95rem; }
  .progress {
    position: sticky; top: 0; z-index: 5;
    background: var(--bg); padding: .7rem 0; margin-bottom: 1rem;
    border-bottom: 1px solid var(--line);
    font-size: .9rem; color: var(--muted);
    display: flex; justify-content: space-between; align-items: center;
  }
  .bar { flex: 1; height: 6px; background: var(--line); border-radius: 3px; margin: 0 1rem; overflow: hidden; }
  .bar > div { height: 100%; width: 0%; background: var(--accent); border-radius: 3px; transition: width .3s; }
  .q {
    background: var(--card); border: 1px solid var(--line); border-radius: 10px;
    padding: 1.4rem 1.5rem; margin-bottom: 1.4rem;
  }
  .q h2 { font-size: 1.05rem; font-weight: 600; margin-bottom: 1rem; }
  .q h2 .num { color: var(--accent); margin-right: .5rem; }
  .opt {
    display: block; width: 100%; text-align: left;
    font-family: inherit; font-size: .97rem; color: var(--ink);
    background: #faf9f5; border: 1px solid var(--line); border-radius: 8px;
    padding: .65rem .9rem; margin-bottom: .55rem; cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .opt:hover:not(:disabled) { border-color: var(--accent); background: #fdf7f2; }
  .opt:disabled { cursor: default; opacity: .92; }
  .opt.correct { background: var(--ok-bg); border-color: var(--ok-border); color: var(--ok-ink); font-weight: 600; }
  .opt.wrong   { background: var(--bad-bg); border-color: var(--bad-border); color: var(--bad-ink); }
  .fb {
    display: none; margin-top: .8rem; padding: .8rem 1rem;
    border-radius: 8px; font-size: .92rem;
  }
  .fb.show { display: block; }
  .fb.ok  { background: var(--ok-bg); border-left: 4px solid var(--ok-border); color: var(--ok-ink); }
  .fb.bad { background: var(--bad-bg); border-left: 4px solid var(--bad-border); color: var(--bad-ink); }
  .fb strong { display: block; margin-bottom: .25rem; }
  code {
    font-family: Consolas, "Courier New", monospace; font-size: .88em;
    background: #efece4; padding: .08em .35em; border-radius: 4px;
  }
  #result {
    display: none; background: var(--card); border: 2px solid var(--accent);
    border-radius: 10px; padding: 1.6rem; text-align: center; margin-top: 2rem;
  }
  #result h2 { font-size: 1.4rem; margin-bottom: .5rem; }
  #result p { color: var(--muted); }
  #result button {
    margin-top: 1rem; font-family: inherit; font-size: .95rem;
    background: var(--accent); color: #fff; border: none; border-radius: 8px;
    padding: .6rem 1.4rem; cursor: pointer;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Quiz — <em>Cliente de API para LLMs</em></h1>
    <p>Lección 1 · prompt-engineering-lab · Elige una alternativa y recibe feedback al instante.</p>
  </header>

  <div class="progress">
    <span id="answered">0 / 0</span>
    <div class="bar"><div id="barfill"></div></div>
    <span id="score">Puntaje: 0</span>
  </div>

  <div id="quiz"></div>

  <div id="result">
    <h2 id="result-title"></h2>
    <p id="result-msg"></p>
    <button onclick="location.reload()">Reintentar quiz</button>
  </div>
</div>

<script>
const QUESTIONS = [
  {
    q: "¿Por qué la API key va en un archivo <code>.env</code> listado en <code>.gitignore</code>?",
    opts: [
      "Para que el código corra más rápido al no leer archivos grandes",
      "Para que git nunca la suba al repo, donde bots la encontrarían en minutos",
      "Porque los archivos .env se encriptan automáticamente",
      "Es solo una convención estética, sin efecto real"
    ],
    correct: 1,
    why: "GitHub público es escaneado 24/7 por bots que buscan keys filtradas. <code>.gitignore</code> hace que git ignore el archivo por completo: el secreto vive solo en tu PC. Los .env NO se encriptan — son texto plano."
  },
  {
    q: "¿Qué hace exactamente <code>load_dotenv()</code> al inicio de un script?",
    opts: [
      "Descarga las variables de entorno desde GitHub",
      "Valida que la API key sea correcta contra el servidor",
      "Lee el archivo .env y carga sus variables al entorno del proceso",
      "Crea el archivo .env si no existe"
    ],
    correct: 2,
    why: "Solo lee el archivo <code>.env</code> local y pone cada línea <code>CLAVE=valor</code> como variable de entorno del proceso. Después, el SDK de Groq la encuentra ahí (busca <code>GROQ_API_KEY</code>). No valida nada ni toca internet."
  },
  {
    q: "La API responde con error <strong>429 (RateLimitError)</strong>. ¿Qué hace nuestro cliente y por qué es lo correcto?",
    opts: [
      "Lanza el error de inmediato: 429 significa que la key es inválida",
      "Reintenta al instante, sin esperar, hasta que funcione",
      "Espera con backoff exponencial y reintenta: el límite de requests/minuto es transitorio",
      "Cambia automáticamente a otro modelo más barato"
    ],
    correct: 2,
    why: "429 = 'demasiadas requests por minuto'. Es un error <em>transitorio</em>: esperar y reintentar funciona. Reintentar al instante empeoraría la saturación (por eso el backoff creciente). Key inválida sería 401."
  },
  {
    q: "¿Por qué el cliente NO reintenta un <strong>400 (BadRequestError)</strong>?",
    opts: [
      "Porque reenviar la misma request mal formada dará siempre el mismo error",
      "Porque los errores 400 son demasiado costosos de reintentar",
      "Sí los reintenta, pero solo una vez",
      "Porque el SDK lo prohíbe técnicamente"
    ],
    correct: 0,
    why: "Un 400 significa que TU request está mal (parámetro inválido, JSON malo…). Es determinista: la misma request dará el mismo error las 50 veces. Mejor fallar rápido con un error claro. Regla: solo se reintenta lo transitorio (429, red, 5xx)."
  },
  {
    q: "En <code>delay = base * 2**intento + random.uniform(0,1)</code>, ¿para qué sirve el término aleatorio (jitter)?",
    opts: [
      "Hace la espera más corta en promedio para ahorrar tiempo",
      "Evita que muchos clientes reintenten todos al mismo tiempo y vuelvan a chocar",
      "Es un requisito de seguridad de la API de Groq",
      "Compensa la imprecisión del reloj del sistema"
    ],
    correct: 1,
    why: "Si 100 clientes fallan a la vez y todos reintentan exactamente a los 2.0s, chocan de nuevo todos juntos (efecto estampida). El azar los desincroniza. El crecimiento exponencial da aire al servidor; el jitter reparte la carga."
  },
  {
    q: "¿Qué diferencia hay entre <code>prompt_tokens</code> y <code>completion_tokens</code>?",
    opts: [
      "prompt = tokens en español, completion = tokens en inglés",
      "prompt = lo que enviaste (instrucciones + historial), completion = lo que el modelo generó",
      "Son sinónimos: ambos miden la respuesta del modelo",
      "prompt = tokens gratis, completion = tokens pagados"
    ],
    correct: 1,
    why: "El input (todo lo que mandas: system, historial, pregunta) son <code>prompt_tokens</code>; la respuesta generada son <code>completion_tokens</code>. Ambos se cobran, pero a precios distintos — generar (output) siempre cuesta más que leer (input)."
  },
  {
    q: "Con precios input=$1 y output=$2 por millón de tokens, ¿cuánto cuesta una llamada con 500.000 prompt_tokens y 250.000 completion_tokens?",
    opts: [
      "$0.75",
      "$1.00",
      "$1.50",
      "$0.50"
    ],
    correct: 1,
    why: "Input: (500.000 / 1M) × $1 = $0.50. Output: (250.000 / 1M) × $2 = $0.50. Total = <strong>$1.00</strong>. Nota cómo el output, con la mitad de tokens, cuesta lo mismo que el input — generar siempre es más caro que leer."
  },
  {
    q: "Para el Proyecto B (extraer campos de facturas), ¿qué configuración de <code>temperature</code> conviene y por qué?",
    opts: [
      "Alta (1.5+), para que el modelo explore interpretaciones creativas de la factura",
      "Baja (0–0.3), porque extracción es un problema de precisión y queremos salidas consistentes",
      "Da igual: temperature solo afecta la velocidad de respuesta",
      "Exactamente 1.0 siempre, es el único valor soportado"
    ],
    correct: 1,
    why: "Temperature controla la aleatoriedad del muestreo. Para extraer datos quieres la MISMA salida correcta cada vez — determinismo, no creatividad. Alta temperature sirve para brainstorming o escritura creativa. No afecta la velocidad."
  },
  {
    q: "¿Qué parámetro fuerza al modelo a responder con JSON válido parseable?",
    opts: [
      "<code>stop=[\"}\"]</code>",
      "<code>max_tokens=json</code>",
      "<code>response_format={\"type\": \"json_object\"}</code>",
      "<code>seed=42</code>"
    ],
    correct: 2,
    why: "<code>response_format</code> con <code>json_object</code> restringe la generación a JSON válido — clave para el Proyecto B, donde vas a parsear la salida con <code>json.loads()</code>. <code>stop</code> corta la generación, <code>seed</code> da reproducibilidad, y <code>max_tokens</code> limita longitud."
  },
  {
    q: "¿Por qué en <code>chat.py</code> reenviamos la lista <code>messages</code> completa en cada turno?",
    opts: [
      "Por un bug del SDK que obliga a hacerlo",
      "Para gastar más tokens y probar el cálculo de costos",
      "Porque la API es sin estado: el modelo no recuerda nada entre llamadas; su 'memoria' es el historial que tú le reenvías",
      "Para que el servidor haga backup de la conversación"
    ],
    correct: 2,
    why: "Cada llamada a la API es independiente (stateless). Si no reenvías el historial, el modelo no sabe qué se dijo antes. Por eso los prompt_tokens crecen turno a turno en conversaciones largas."
  },
  {
    q: "¿Cuál es la diferencia entre zero-shot y few-shot prompting?",
    opts: [
      "Zero-shot usa temperature 0; few-shot usa temperature alta",
      "Zero-shot da solo la instrucción; few-shot incluye ejemplos resueltos antes del caso real",
      "Zero-shot es gratis; few-shot requiere plan pagado",
      "Few-shot solo funciona con modelos de OpenAI"
    ],
    correct: 1,
    why: "Few-shot le muestra al modelo 2-3 ejemplos entrada→salida antes del caso real, enseñándole el formato exacto y cómo resolver ambigüedades. Suele mejorar accuracy y consistencia… a cambio de más tokens por llamada. Tu Proyecto B debe MEDIR ese trade-off."
  },
  {
    q: "En tu evaluación, el prompt zero-shot acierta 14 de 20 casos y el few-shot 18 de 20. ¿Cuáles son las accuracy?",
    opts: [
      "70% y 90%",
      "14% y 18%",
      "6% de diferencia, accuracy no se calcula así",
      "50% y 75%"
    ],
    correct: 0,
    why: "Accuracy = aciertos / total. 14/20 = 0.70 → 70%; 18/20 = 0.90 → 90%. La decisión final compara ese +20% de accuracy contra el costo extra en tokens del few-shot: eso es exactamente la tabla comparativa del Proyecto 5."
  },
  {
    q: "¿Por qué guardar los casos de prueba del mini framework en un archivo YAML y no dentro del código Python?",
    opts: [
      "YAML se ejecuta más rápido que Python",
      "Separa datos de código: agregar un caso es editar texto legible, sin tocar la lógica",
      "Python no puede almacenar strings largos",
      "YAML encripta los casos de prueba automáticamente"
    ],
    correct: 1,
    why: "Separar datos (casos de prueba) de código (el runner) es un principio de diseño: cualquiera puede agregar casos sin saber Python, los casos se versionan limpiamente en git, y el mismo runner sirve para cualquier set de casos. YAML no se ejecuta ni encripta nada."
  }
];

const quizEl = document.getElementById("quiz");
let answered = 0, score = 0;

QUESTIONS.forEach((item, qi) => {
  const card = document.createElement("div");
  card.className = "q";
  card.innerHTML = `<h2><span class="num">${qi + 1}.</span>${item.q}</h2>`;

  // Shuffle option order but track the correct one
  const order = item.opts.map((_, i) => i).sort(() => Math.random() - 0.5);

  order.forEach(oi => {
    const btn = document.createElement("button");
    btn.className = "opt";
    btn.innerHTML = item.opts[oi];
    btn.onclick = () => answer(card, item, oi, btn);
    card.appendChild(btn);
  });

  const fb = document.createElement("div");
  fb.className = "fb";
  card.appendChild(fb);
  quizEl.appendChild(card);
});

function answer(card, item, chosen, btn) {
  const buttons = card.querySelectorAll(".opt");
  buttons.forEach(b => b.disabled = true);

  const isRight = chosen === item.correct;
  if (isRight) { score++; }
  answered++;

  // Mark chosen + reveal correct
  btn.classList.add(isRight ? "correct" : "wrong");
  if (!isRight) {
    buttons.forEach(b => {
      if (b.innerHTML === item.opts[item.correct]) b.classList.add("correct");
    });
  }

  const fb = card.querySelector(".fb");
  fb.classList.add("show", isRight ? "ok" : "bad");
  fb.innerHTML = `<strong>${isRight ? "✔ Correcto" : "✘ Incorrecto"}</strong>${item.why}`;

  updateProgress();
  if (answered === QUESTIONS.length) showResult();
}

function updateProgress() {
  document.getElementById("answered").textContent = `${answered} / ${QUESTIONS.length}`;
  document.getElementById("score").textContent = `Puntaje: ${score}`;
  document.getElementById("barfill").style.width = (answered / QUESTIONS.length * 100) + "%";
}

function showResult() {
  const pct = Math.round(score / QUESTIONS.length * 100);
  const r = document.getElementById("result");
  document.getElementById("result-title").textContent = `${score} / ${QUESTIONS.length} (${pct}%)`;
  let msg;
  if (pct >= 90) msg = "Excelente — estás listo para el Proyecto B (extractor de datos) y el mini framework de evaluación.";
  else if (pct >= 70) msg = "Bien. Repasa las preguntas falladas en docs/leccion-01-cliente-api.md antes de partir el Proyecto B.";
  else msg = "Relee la lección (docs/leccion-01-cliente-api.md) con calma y vuelve a intentarlo — especialmente las secciones de errores, tokens y evaluación.";
  document.getElementById("result-msg").textContent = msg;
  r.style.display = "block";
  r.scrollIntoView({ behavior: "smooth" });
}

updateProgress();
</script>
</body>
</html>
